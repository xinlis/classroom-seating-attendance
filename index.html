<style>

e00);color:#fff;font-weight:800}.auth-remember{display:flex!important;flex-direction:row!important;align-items:center;gap:9px;color:var(--text)!important;font-size:14px}.auth-remember input{width:18px;height:18px;accent-color:var(--accent)}.auth-message{min-height:20px;color:#b3261e;font-size:13px}.auth-locked{overflow:hidden}.auth-locked .page{filter:blur(8px);pointer-events:none;user-select:none}.auth-logout{position:fixed;right:14px;top:14px;z-index:800;min-height:38px;padding:0 14px;border:1px solid var(--line);border-radius:999px;background:rgba(255,253,249,.92);color:var(--muted);font-size:13px;font-weight:800;box-shadow:0 8px 18px rgba(70,42,10,.1)}.auth-logout:hover{color:var(--text)}.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(14px);padding:10px 16px;border-radius:999px;background:rgba(56,40,23,.92);color:#fff;font-size:14px;opacity:0;pointer-events:none;transition:.2s;z-index:1000}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

<body class="auth-locked">
<div class="auth-gate" id="authGate">
<form class="auth-card" id="authForm">
<h1>班级座位与考勤</h1>
<p>请输入访问密码后继续使用。</p>
<label for="authPassword">访问密码<input id="authPassword" type="password" autocomplete="current-password" placeholder="请输入密码" /></label>
<label class="auth-remember"><input id="authRemember" type="checkbox" /> 记住密码</label>
<button type="submit">进入系统</button>
<div class="auth-message" id="authMessage"></div>
</form>
</div>
<button class="auth-logout" id="authLogoutBtn" type="button">退出登录</button>
<div class="page">
<section class="panel top">
<div class="top-main">
<div class="head"><div><div class="title">班级座位与考勤</div><div class="sub">保留日常最常用的功能：导入表格、手动调座、日常考勤和日志复制。复杂导入入口已去掉，操作会更直接。</div></div><div class="today" id="todayInfo"></div></div>
<div class="form-grid">
<div class="field"><label for="classNameInput">班级名称</label><input id="classNameInput" type="text" placeholder="例如：三批/供服一班" /></div>
<div class="field"><label for="seatTemplateInput">座位模板</label><textarea id="seatTemplateInput" placeholder="每行一排，可自定义分组，例如：3,4,3,4"></textarea></div>
<div class="field"><label for="shiftStartDateInput">轮换起始日期</label><input id="shiftStartDateInput" type="date" /></div>
<div class="field"><label for="shiftIntervalInput">轮换间隔天数</label><input id="shiftIntervalInput" type="number" min="1" max="30" step="1" placeholder="例如：4" /></div>
<div class="field"><label>轮换信息</label><div id="shiftInfo" class="shift-box"></div></div>
</div>
</div>
</section>
<section class="panel toolbar">
<div class="toolbar-row"><button id="editToggleBtn" class="mode-btn">当前已锁定</button><button id="attendanceModeBtn" class="mode-btn active">考勤模式</button><button id="swapModeBtn" class="mode-btn">换座模式</button><button id="manualShiftBtn" class="mini-btn">手动右移2位</button><button id="importSheetBtn" class="mini-btn">导入表格</button><button id="importDataBtn" class="mini-btn">导入备份</button><button id="exportDataBtn" class="mini-btn">导出备份</button><input id="importDataInput" type="file" accept="application/json" hidden /><input id="importSheetInput" type="file" accept=".xls,.xlsx,.csv,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,text/csv" hidden /></div>
<div class="search-row"><input id="searchInput" type="text" placeholder="输入姓名或拼音首字母，如：wy乐 / wyl" /><button id="clearSearchBtn" class="mini-btn">清空检索</button></div>
<div class="tip" id="toolbarTip"></div>
<div class="session-row" id="sessionRow"></div>
<div class="summary" id="summaryCards"></div>
</section>
<section class="panel toolbar">
<div class="toolbar-row"><button id="generateLayoutBtn" class="btn primary">生成空表</button></div>
<div class="tip">这个按钮会按当前座位模板重新生成整张空表，适合开新班或重置时再点。</div>
</section>
<section class="main">
<section class="panel classroom"><div class="podium">讲 台</div><div class="seat-board"><div id="seatLayout" class="seat-layout"></div></div></section>
<aside class="panel side">
<section class="side-block"><div class="side-title">使用说明</div><div class="side-text" id="tipsText"></div></section>
<section class="side-block"><div class="log-head"><span>考勤文字</span><button id="copyLogBtn" class="mini-btn">一键复制</button></div><div class="side-text">自动按当前日期和当前时段生成。</div><div class="log-box" id="attendanceText"></div></section>
<section class="side-block"><div class="side-title">考勤日历</div><div class="calendar-tools"><input id="calendarMonthInput" type="month" /><button id="calendarTodayBtn" class="mini-btn">今天</button><input id="exportStartDateInput" type="date" /><input id="exportEndDateInput" type="date" /><button id="exportStatsBtn" class="mini-btn">区间导出</button></div><div id="calendarLegend" class="calendar-legend"></div><div id="calendarGrid" class="calendar-grid"></div></section>
<section class="side-block"><div class="side-title">未安排学生</div><div class="inline-form"><input id="newStudentInput" type="text" placeholder="输入新来学生姓名" /><button id="addStudentBtn" class="mini-btn">添加学生</button></div><div class="side-text">新来学生先加入这里，再点姓名安排到空位。需要退班时，可直接删除。</div><div id="unassignedList" class="chip-list"></div></section>
</aside>
</section>

function normalizeOcrName(text){return String(text||"").replace(/\s+/g,"").replace(/[|¦ˉ_~`"'“”‘’]/g,"").replace(/[，,.;:：；]/g,"").replace(/[()（）\[\]【】]/g,"").trim();}

function splitPreviewRow(line,rowRule){const parts=String(line||"").split("|");if(parts.length>=2){const names=[];for(let i=0;i<rowRule.groups.length;i+=1){const need=rowRule.groups[i];const groupNames=splitNameTokens(parts[i]||"");if(groupNames.length>need)throw new Error("某一组人数超出了当前座位模板，请检查名单内容");names.push(...groupNames.concat(Array(Math.max(0,need-groupNames.length)).fill("")));}return names;}const merged=splitNameTokens(line);const total=getRowRuleSeatCount(rowRule);if(merged.length>total)throw new Error("某一排人数超出了当前座位模板，请检查名单内容");return merged.concat(Array(Math.max(0,total-merged.length)).fill(""));}

function importSheetSequentially(){if(!state.sheetImportDraft)return;try{const rows=state.sheetImportDraft.rows;const names=String(el.sheetImportPreview.value||"").split(/\r?\n/).flatMap(line=>splitNameTokens(String(line).replace(/\|/g," ")));const namesByRow=[];let cursor=0;rows.forEach(rowRule=>{const count=getRowRuleSeatCount(rowRule);const rowNames=names.slice(cursor,cursor+count);cursor+=count;namesByRow.push(rowNames.concat(Array(Math.max(0,count-rowNames.length)).fill("")));});applySeatImport(namesByRow);showToast("名单已按顺序导入");}catch(error){showToast(error&&error.message?error.message:"按顺序导入失败");}}
async function importSheetFile(file){if(!file)return;let rows;try{rows=parseSeatTemplate(el.seatTemplateInput.value.trim()||DEFAULT_TEMPLATE);}catch(error){showToast(error.message||"请先设置座位模板");return;}if(countStudents()&&!window.confirm("导入表格会覆盖当前座位表，是否继续？"))return;try{showToast("正在读取表格…");const XLSX=await ensureSheetJs();const buffer=await file.arrayBuffer();const workbook=XLSX.read(buffer,{type:"array"});const firstSheetName=workbook.SheetNames&&workbook.SheetNames[0];if(!firstSheetName)throw new Error("表格里没有工作表");const sheet=workbook.Sheets[firstSheetName];const aoa=XLSX.utils.sheet_to_json(sheet,{header:1,defval:"",blankrows:false});const previewText=buildSheetFallbackText(aoa);if(!previewText.trim())throw new Error("表格里没有识别到可用座位数据，请检查表格内容");openSheetImportModal(previewText,aoa,rows);}catch(error){showToast(error&&error.message?error.message:"表格导入失败，请检查表格内容或另存为 xlsx 后重试");el.importSheetInput.value="";}}
function reconcileUnassignedStudents(){const seatedNames=new Set(getUsableSeats().map(seat=>(seat.name||"").trim()).filter(Boolean));const seen=new Set();state.data.unassignedStudents=(Array.isArray(state.data.unassignedStudents)?state.data.unassignedStudents:[]).map(name=>String(name||"").trim()).filter(Boolean).filter(name=>{if(seatedNames.has(name)||seen.has(name))return false;seen.add(name);return true;});}
function rotateArrayRight(arr,steps){if(!arr.length)return arr.slice();const s=((steps%arr.length)+arr.length)%arr.length;if(!s)return arr.slice();return arr.slice(-s).concat(arr.slice(0,-s));}
function rotateSeatsRightByRule(steps){if(!steps)return;state.data.seatMatrix.forEach(row=>{const seats=row.filter(cell=>cell.type==="seat"&&!cell.blocked);const payloads=seats.map(seat=>({name:seat.name||"",commuter:!!seat.commuter,attendance:getAttendanceRecord(seat.seatNumber)?{...getAttendanceRecord(seat.seatNumber)}:null}));const rotated=rotateArrayRight(payloads,steps);seats.forEach(seat=>clearAttendanceForSeat(seat.seatNumber));seats.forEach((seat,index)=>{const payload=rotated[index]||{name:"",commuter:false,attendance:null};seat.name=payload.name||"";seat.commuter=!!(payload.name&&payload.commuter);setAttendanceRecord(seat.seatNumber,payload.attendance);});});}
function getShiftIntervalDays(){const value=Number(state.data.shiftIntervalDays||4);return Number.isInteger(value)&&value>=1&&value<=30?value:4;}
function getNextScheduledShiftDate(lastShiftKey,startKey,intervalDays=getShiftIntervalDays()){return lastShiftKey===startKey?addDaysToDateKey(startKey,intervalDays-1):addDaysToDateKey(lastShiftKey,intervalDays);}
function getShiftDateTime(dateKey){const dt=dateFromKey(dateKey);dt.setHours(17,30,0,0);return dt;}
function getShiftCountdownText(nextShiftKey){const diff=getShiftDateTime(nextShiftKey)-new Date();if(diff<=0)return"即将换座";const totalMinutes=Math.ceil(diff/60000);const days=Math.floor(totalMinutes/1440);const hours=Math.floor((totalMinutes%1440)/60);const minutes=totalMinutes%60;const parts=[];if(days)parts.push(`${days}天`);if(hours)parts.push(`${hours}小时`);parts.push(`${minutes}分钟`);return parts.join("");}
function getEffectiveShiftTargetDateKey(targetDateKey){const now=getToday();const d=new Date();const minutes=d.getHours()*60+d.getMinutes();return targetDateKey===now.dateKey&&minutes<1050?addDaysToDateKey(targetDateKey,-1):targetDateKey;}
function applyScheduledSeatShift(targetDateKey,silent){if(!state.data.shiftStartDate)state.data.shiftStartDate=targetDateKey;if(!state.data.lastSeatShiftDate)state.data.lastSeatShiftDate=state.data.shiftStartDate||targetDateKey;const startKey=state.data.shiftStartDate||targetDateKey;const intervalDays=getShiftIntervalDays();const effectiveTargetKey=getEffectiveShiftTargetDateKey(targetDateKey);let cycleCount=0;let nextShiftKey=getNextScheduledShiftDate(state.data.lastSeatShiftDate,startKey,intervalDays);while(nextShiftKey<=effectiveTargetKey){cycleCount+=1;state.data.lastSeatShiftDate=nextShiftKey;nextShiftKey=addDaysToDateKey(nextShiftKey,intervalDays);}if(!cycleCount)return false;const moveSteps=cycleCount*2;rotateSeatsRightByRule(moveSteps);reconcileUnassignedStudents();saveState();if(!silent)showToast(`座位已按${intervalDays}天规则向右轮换 ${moveSteps} 个座位`);return true;}
function manualShiftSeats(){const hasStudent=getUsableSeats().some(seat=>(seat.name||"").trim());if(!hasStudent){showToast("当前座位表还没有学生");return;}rotateSeatsRightByRule(2);reconcileUnassignedStudents();state.data.lastSeatShiftDate=state.currentDateKey;saveState();renderAll();showToast("已手动向右平移2个座位");}
function updateShiftInterval(){const value=Number(el.shiftIntervalInput.value);if(!Number.isInteger(value)||value<1||value>30){el.shiftIntervalInput.value=getShiftIntervalDays();showToast("轮换间隔请填写1到30天");return;}state.data.shiftIntervalDays=value;saveState();renderAll();showToast(`已设置为每${value}天一换`);}
function showToast(msg){el.toast.textContent=msg;el.toast.classList.add("show");clearTimeout(state.toastTimer);state.toastTimer=setTimeout(()=>el.toast.classList.remove("show"),1800);}
function generateEmptyLayout(){try{const tpl=el.seatTemplateInput.value.trim()||DEFAULT_TEMPLATE;state.data.seatMatrix=buildEmptyMatrixFromTemplate(tpl);state.data.seatTemplate=tpl;state.data.className=el.classNameInput.value.trim();state.data.attendanceByDate={};state.data.unassignedStudents=[];state.data.shiftStartDate=el.shiftStartDateInput.value||state.currentDateKey;state.data.lastSeatShiftDate=state.data.shiftStartDate;state.swapSourceSeat=null;state.pendingUnassignedIndex=null;saveState();renderAll();showToast("空表已生成");}catch(error){showToast(error.message||"座位模板有误");}}
function countStudents(){return getUsableSeats().filter(seat=>(seat.name||"").trim()).length+state.data.unassignedStudents.length;}
function calculateSummary(){const total=countStudents();let seated=0,present=0;const bucket=getBucket();getUsableSeats().forEach(seat=>{if(!(seat.name||"").trim())return;seated+=1;const record=bucket[String(seat.seatNumber)];if(!record||!record.status||record.status==="late")present+=1;});return{total,seated,present};}
function getSessionStats(dateKey,session){const total=countStudents();let seated=0,present=0;const bucket=getSessionBucket(dateKey,session,false)||{};const groups={late:[],leave:[],absent:[]};getUsableSeats().forEach(seat=>{if(!(seat.name||"").trim())return;seated+=1;const record=bucket[String(seat.seatNumber)];if(!record||!record.status||record.status==="late")present+=1;if(record&&record.status&&groups[record.status])groups[record.status].push(record.note?`${seat.name}（${record.note}）`:seat.name);});return{total,seated,present,late:groups.late,leave:groups.leave,absent:groups.absent,saved:isSessionSaved(dateKey,session)};}
function getDateOverview(dateKey){const sessions=SESSIONS.map(session=>getSessionStats(dateKey,session));const savedCount=sessions.filter(item=>item.saved).length;const abnormalCount=sessions.reduce((sum,item)=>sum+item.late.length+item.leave.length+item.absent.length,0);return{savedCount,abnormalCount};}
function renderCalendar(){el.calendarMonthInput.value=state.calendarMonth;const monthValue=state.calendarMonth;const dayCount=getMonthDayCount(monthValue);const monthStart=`${monthValue}-01`;const monthEnd=`${monthValue}-${String(dayCount).padStart(2,"0")}`;el.exportStartDateInput.value=el.exportStartDateInput.value||monthStart;el.exportEndDateInput.value=el.exportEndDateInput.value||monthEnd;el.calendarLegend.textContent=`已选日期：${state.currentDateDisplay}；绿色表示当天已有可统计考勤，橙色表示当前选中日期。导出统计时可自由选择开始日期和结束日期。`;el.calendarGrid.innerHTML="";["日","一","二","三","四","五","六"].forEach(text=>{const item=document.createElement("div");item.className="calendar-weekday";item.textContent=text;el.calendarGrid.appendChild(item);});const firstWeekday=getMonthFirstWeekday(monthValue);for(let i=0;i<firstWeekday;i+=1){const empty=document.createElement("div");empty.className="calendar-day empty";el.calendarGrid.appendChild(empty);}for(let day=1;day<=dayCount;day+=1){const dateKey=`${monthValue}-${String(day).padStart(2,"0")}`;const info=getDateOverview(dateKey);const cell=document.createElement("button");cell.type="button";cell.className=`calendar-day${state.currentDateKey===dateKey?" active":info.savedCount?" has-record":""}`;cell.innerHTML=`<div class="day-num">${day}</div><div class="day-meta">${info.savedCount?`${info.savedCount}个时段`:"未记录"}</div><div class="day-meta">${info.abnormalCount?`异常${info.abnormalCount}人次`:"无异常"}</div>`;cell.addEventListener("click",()=>{setCurrentDate(dateKey);renderAll();});el.calendarGrid.appendChild(cell);}}
function exportCsvFile(filename,rows){const csv=rows.map(row=>row.map(value=>`"${String(value??"").replace(/"/g,'""')}"`).join(",")).join("\n");const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);}
function exportAttendanceStats(){const startDate=el.exportStartDateInput.value;const endDate=el.exportEndDateInput.value;if(!startDate||!endDate){showToast("请先选择导出开始日期和结束日期");return;}if(startDate>endDate){showToast("开始日期不能晚于结束日期");return;}const rows=[["日期","时段","总人数","已入座","实到","迟到","请假","未到"]];for(let dateKey=startDate;dateKey<=endDate;dateKey=addDaysToDateKey(dateKey,1)){SESSIONS.forEach(session=>{const stats=getSessionStats(dateKey,session);if(!stats.saved)return;rows.push([formatDateKey(dateKey),session,stats.total,stats.seated,stats.present,stats.late.length,stats.leave.length,stats.absent.length]);});}if(rows.length===1){showToast("所选日期区间内还没有可导出的考勤记录");return;}exportCsvFile(`${(state.data.className||"班级考勤").trim()||"班级考勤"}-${startDate}到${endDate}-考勤统计.csv`,rows);showToast("考勤统计已导出");}
function renderSessions(){el.sessionRow.innerHTML="";SESSIONS.forEach(session=>{const b=document.createElement("button");b.className=`session-btn${state.currentSession===session?" active":""}`;b.textContent=session;b.addEventListener("click",()=>{state.currentSession=session;renderAll();});el.sessionRow.appendChild(b);});}
function renderSummary(){const s=calculateSummary();[{label:"总人数",value:s.total},{label:"已入座",value:s.seated},{label:"实到",value:s.present}].forEach(item=>{const card=document.createElement("div");card.className="card";card.innerHTML=`<span>${item.label}</span><strong>${item.value}</strong>`;el.summaryCards.appendChild(card);});}
function getSeatStatusText(seat){if(seat.blocked)return"墙位";const record=getAttendanceRecord(seat.seatNumber);if(!record||!record.status)return"";const opt=STATUS_OPTIONS.find(x=>x.key===record.status);return opt?opt.label:"";}
function getSeatClassName(seat){const list=["seat"];if(seat.blocked){list.push("blocked");return list.join(" ");}const hasName=!!(seat.name||"").trim();if(!hasName)list.push("empty");if(state.pendingUnassignedIndex!==null&&!hasName)list.push("pending-target");const record=getAttendanceRecord(seat.seatNumber);if(record&&record.status){const opt=STATUS_OPTIONS.find(x=>x.key===record.status);if(opt)list.push(opt.seatClass);}if(seat.commuter)list.push("commuter");if(matchesSearch(seat))list.push("search-hit");if(state.swapSourceSeat===seat.seatNumber)list.push("selected");return list.join(" ");}
function renderSeats(){el.seatLayout.innerHTML="";state.data.seatMatrix.forEach((row,rowIndex)=>{const rowEl=document.createElement("div");rowEl.className="seat-row";rowEl.style.gridTemplateColumns=`var(--row-label-width) repeat(${row.length}, minmax(var(--seat-min-width), 1fr))`;const label=document.createElement("div");label.className="row-label";label.textContent=`第${rowIndex+1}排`;rowEl.appendChild(label);row.forEach(cell=>{if(cell.type==="wall-gap"){const d=document.createElement("div");d.className="wall-gap";rowEl.appendChild(d);return;}if(cell.type==="aisle-gap"){const d=document.createElement("div");d.className="aisle-gap";rowEl.appendChild(d);return;}const displayNo=getDisplaySeatNumber(cell.seatNumber);const hint=state.editLocked?(cell.blocked?"不可操作":state.currentMode==="attendance"?"点此考勤":"点此换座"):"点此编辑";const seat=document.createElement("button");seat.type="button";seat.className=getSeatClassName(cell);seat.innerHTML=`<div class="seat-top"><span class="seat-number">${displayNo?`${displayNo}号`:"墙位"}</span>${cell.commuter&&(cell.name||"").trim()&&!cell.blocked?'<span class="seat-tag">走</span>':""}</div><div class="seat-name">${cell.blocked?"墙":(cell.name||"").trim()||"空位"}</div><div class="seat-status">${getSeatStatusText(cell)}</div><div class="seat-hint">${hint}</div>`;seat.addEventListener("click",()=>handleSeatClick(cell.seatNumber));rowEl.appendChild(seat);});el.seatLayout.appendChild(rowEl);});}
function renderUnassignedList(){el.unassignedList.innerHTML="";if(!state.data.unassignedStudents.length){const empty=document.createElement("div");empty.className="tip";empty.textContent="当前没有未安排学生";el.unassignedList.appendChild(empty);return;}state.data.unassignedStudents.forEach((name,index)=>{const wrap=document.createElement("div");wrap.className=`student-chip${state.pendingUnassignedIndex===index?" active":""}`;const assign=document.createElement("button");assign.className="mini-btn";assign.textContent=name;assign.addEventListener("click",()=>togglePendingUnassigned(index));const del=document.createElement("button");del.className="mini-btn danger";del.textContent="×";del.setAttribute("aria-label",`删除 ${name}`);del.addEventListener("click",()=>deleteUnassignedStudent(index));wrap.appendChild(assign);wrap.appendChild(del);el.unassignedList.appendChild(wrap);});}
function buildAttendanceText(){const className=(el.classNameInput.value||state.data.className||"未命名班级").trim();const groups={late:[],leave:[],absent:[]};getUsableSeats().filter(seat=>(seat.name||"").trim()).forEach(seat=>{const record=getAttendanceRecord(seat.seatNumber);if(!record||!record.status)return;const text=record.note?`${seat.name}（${record.note}）`:seat.name;if(groups[record.status])groups[record.status].push(text);});const parts=[`${className}${state.currentDateDisplay}${state.currentSession}考勤汇总：`];if(groups.leave.length)parts.push(`请假：${groups.leave.join("，")}`);if(groups.late.length)parts.push(`迟到：${groups.late.join("，")}`);if(groups.absent.length)parts.push(`未到：${groups.absent.join("，")}`);parts.push("其余同学均已到课。");return parts.join("\n");}

function renderTips(){el.tipsText.textContent=state.editLocked?"当前是锁定状态。\n默认全部视为已到，并显示为绿色。\n只需要手动点迟到、请假或未到。\n上午过了中午12点、下午过了18点后，会自动算作已保存。\n晚自习会在第二天自动算作已保存。\n墙位不会参与编号、考勤和换座。\n如果要新增学生、改姓名、清空座位或标记走读，先点右上角按钮解锁。":"当前是解锁状态。\n点任意座位方块可直接填写或修改姓名。\n不填姓名就保持空位，空位不计入人数。\n如果某个位置其实是墙，可以点进去设为墙位。\n编辑弹窗里可以勾选走读，保存后座位上会显示“走”。\n编辑完成后再锁定，方便后续做考勤和换座。";if(state.editLocked&&state.pendingUnassignedIndex!==null){const name=state.data.unassignedStudents[state.pendingUnassignedIndex]||"该学生";el.toolbarTip.textContent=`已选中 ${name}：现在直接点一个高亮空位即可安排入座，再点一次姓名可取消。`;}else{el.toolbarTip.textContent=state.editLocked?(state.currentMode==="attendance"?"锁定中：系统会按手机当前时间默认切到上午、下午或晚自习；过了该时段会自动保存。":"锁定中：点一个学生，再选目标座位号；也可以把当前座位直接设为空位。"):"解锁中：点方块手填姓名、清空座位、设为墙位，或勾选走读。";}el.editToggleBtn.textContent=state.editLocked?"当前已锁定":"当前可编辑";el.editToggleBtn.classList.toggle("primary",!state.editLocked);el.attendanceModeBtn.classList.toggle("active",state.currentMode==="attendance");el.swapModeBtn.classList.toggle("active",state.currentMode==="swap");}
function renderShiftInfo(){const startKey=state.data.shiftStartDate||state.currentDateKey;const lastShiftKey=state.data.lastSeatShiftDate||startKey;const intervalDays=getShiftIntervalDays();const nextShiftKey=getNextScheduledShiftDate(lastShiftKey,startKey,intervalDays);el.shiftInfo.innerHTML=`起始日期：${formatDateKey(startKey)}<br>上次轮换：${formatDateKey(lastShiftKey)}<br>下次轮换：${formatDateKey(nextShiftKey)} 17:30后<br>倒计时：${getShiftCountdownText(nextShiftKey)}<br>规则：起始日算第1天，每${intervalDays}天在下午5:30向右平移2个座位`;}

function openSeatPickerForUnassigned(index){const name=state.data.unassignedStudents[index];if(!name){showToast("学生不存在");return;}state.pendingUnassignedIndex=index;state.swapSourceSeat=null;el.seatPickerTitle.textContent=`安排 ${name} 入座`;el.seatPickerSubtitle.textContent="请选择一个空位。";renderSeatPicker();el.seatPickerModal.classList.add("show");}
function openSeatPickerForSwap(no){const seat=getSeatByNumber(no);if(!seat||seat.blocked||!(seat.name||"").trim()){showToast("空位不用换座");return;}state.swapSourceSeat=no;el.seatPickerTitle.textContent=`${seat.name} 当前在 ${getDisplaySeatNumber(seat.seatNumber)}号`;el.seatPickerSubtitle.textContent="点目标座位号即可移动；如果目标已有学生，会自动互换。";renderSeatPicker();el.seatPickerModal.classList.add("show");}
function renderSeatPicker(){el.seatPickerGrid.innerHTML="";getUsableSeats().forEach(seat=>{const b=document.createElement("button");const current=state.swapSourceSeat===seat.seatNumber;const hasName=!!(seat.name||"").trim();const displayNo=getDisplaySeatNumber(seat.seatNumber);b.className=`picker-seat${current?" current":hasName?" occupied":" empty-target"}`;b.textContent=hasName?`${displayNo}号 ${seat.name}`:`${displayNo}号 空位`;b.addEventListener("click",()=>state.pendingUnassignedIndex!==null?placeUnassignedStudentToSeat(state.pendingUnassignedIndex,seat.seatNumber):moveSeatToSeat(state.swapSourceSeat,seat.seatNumber));el.seatPickerGrid.appendChild(b);});}
function closeSeatPickerModal(){state.swapSourceSeat=null;state.pendingUnassignedIndex=null;el.seatPickerModal.classList.remove("show");}
function placeUnassignedStudentToSeat(index,toNo,directPlace){const name=state.data.unassignedStudents[index];const seat=getSeatByNumber(toNo);if(!name||!seat||seat.blocked)return;if((seat.name||"").trim()){showToast("请先选择空位");return;}seat.name=name;seat.commuter=false;state.data.unassignedStudents.splice(index,1);if(directPlace){state.pendingUnassignedIndex=null;state.swapSourceSeat=null;}else closeSeatPickerModal();renderAll();showToast(`${name} 已安排到 ${getDisplaySeatNumber(seat.seatNumber)}号`);}
function moveSeatToSeat(fromNo,toNo){if(!fromNo||!toNo)return;if(fromNo===toNo){closeSeatPickerModal();renderAll();return;}const fromSeat=getSeatByNumber(fromNo),toSeat=getSeatByNumber(toNo);if(!fromSeat||!toSeat)return;const fp={name:fromSeat.name,commuter:!!fromSeat.commuter};const tp={name:toSeat.name,commuter:!!toSeat.commuter};const fa=getAttendanceRecord(fromSeat.seatNumber),ta=getAttendanceRecord(toSeat.seatNumber);fromSeat.name=tp.name||"";fromSeat.commuter=!!(tp.name&&tp.commuter);toSeat.name=fp.name||"";toSeat.commuter=!!(fp.name&&fp.commuter);setAttendanceRecord(fromSeat.seatNumber,ta?{...ta}:null);setAttendanceRecord(toSeat.seatNumber,fa?{...fa}:null);closeSeatPickerModal();renderAll();showToast("换座已完成");}
function clearSeatOnly(){const seat=getSeatByNumber(state.swapSourceSeat);if(!seat)return;seat.name="";seat.commuter=false;clearAttendanceForSeat(seat.seatNumber);closeSeatPickerModal();renderAll();showToast(`${getDisplaySeatNumber(seat.seatNumber)}号已设为空位`);}
function handleSeatClick(no){const seat=getSeatByNumber(no);if(!seat)return;if(!state.editLocked){openSeatEditor(no);return;}if(seat.blocked){return;}if(state.pendingUnassignedIndex!==null){placeUnassignedStudentToSeat(state.pendingUnassignedIndex,no,true);return;}if(state.currentMode==="attendance")openAttendanceModal(no);else openSeatPickerForSwap(no);}
function exportData(){try{const payload={version:1,exportedAt:new Date().toISOString(),data:state.data};const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");const className=(state.data.className||"班级座位").trim()||"班级座位";a.href=url;a.download=`${className}-数据备份.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);showToast("数据已导出");}catch(e){showToast("导出失败");}}
function importDataFromFile(file){if(!file){return;}const reader=new FileReader();reader.onload=()=>{try{const parsed=JSON.parse(String(reader.result||"{}"));const imported=parsed&&parsed.data?parsed.data:parsed;if(!imported||!Array.isArray(imported.seatMatrix)||!imported.seatMatrix.length){throw new Error("文件内容不对");}state.data={className:imported.className||"",seatTemplate:imported.seatTemplate||deriveSeatTemplateFromMatrix(imported.seatMatrix),seatMatrix:imported.seatMatrix,attendanceByDate:imported.attendanceByDate||{},unassignedStudents:Array.isArray(imported.unassignedStudents)?imported.unassignedStudents.filter(Boolean):[],shiftStartDate:imported.shiftStartDate||imported.lastSeatShiftDate||state.currentDateKey,lastSeatShiftDate:imported.lastSeatShiftDate||imported.shiftStartDate||state.currentDateKey,shiftIntervalDays:Number.isInteger(Number(imported.shiftIntervalDays))&&Number(imported.shiftIntervalDays)>=1?Number(imported.shiftIntervalDays):4};reconcileUnassignedStudents();state.swapSourceSeat=null;state.pendingUnassignedIndex=null;state.editingSeat=null;closeAttendanceModal();closeSeatPickerModal();closeSeatEditor();applyScheduledSeatShift(state.currentDateKey,true);renderAll();showToast("数据已导入");}catch(error){showToast("导入失败，文件不对");}finally{el.importDataInput.value="";}};reader.onerror=()=>{showToast("导入失败");el.importDataInput.value="";};reader.readAsText(file,"utf-8");}
async function copyLog(){const text=buildAttendanceText();try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(text);}else{const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.focus();ta.select();document.execCommand("copy");document.body.removeChild(ta);}renderAll();showToast("考勤文字已复制");}catch(e){showToast("复制失败，请手动复制");}}
function toggleEditLock(){state.editLocked=!state.editLocked;if(!state.editLocked){closeAttendanceModal();closeSeatPickerModal();}renderAll();showToast(state.editLocked?"已锁定，适合考勤和换座":"已解锁，可以编辑座位");}
function initEvents(){el.classNameInput.addEventListener("input",()=>{state.data.className=el.classNameInput.value.trim();renderLogPreview();saveState();});el.seatTemplateInput.addEventListener("input",()=>{state.data.seatTemplate=el.seatTemplateInput.value;saveState();});el.shiftStartDateInput.addEventListener("change",()=>{const value=el.shiftStartDateInput.value;if(!value)return;state.data.shiftStartDate=value;state.data.lastSeatShiftDate=value;applyScheduledSeatShift(state.currentDateKey,true);renderAll();showToast(`轮换起始日期已设置为 ${formatDateKey(value)}`);});el.calendarMonthInput.addEventListener("change",()=>{if(!el.calendarMonthInput.value)return;state.calendarMonth=el.calendarMonthInput.value;renderCalendar();});el.calendarTodayBtn.addEventListener("click",()=>{syncWithDeviceTime(true);renderAll();});el.exportStatsBtn.addEventListener("click",exportAttendanceStats);el.searchInput.addEventListener("input",()=>{state.searchQuery=el.searchInput.value.trim();renderSeats();});el.clearSearchBtn.addEventListener("click",()=>{state.searchQuery="";el.searchInput.value="";renderSeats();});el.generateLayoutBtn.addEventListener("click",generateEmptyLayout);el.editToggleBtn.addEventListener("click",toggleEditLock);el.attendanceModeBtn.addEventListener("click",()=>{state.currentMode="attendance";renderAll();});el.swapModeBtn.addEventListener("click",()=>{state.currentMode="swap";renderAll();});el.exportDataBtn.addEventListener("click",exportData);el.importDataBtn.addEventListener("click",()=>el.importDataInput.click());el.importSheetBtn.addEventListener("click",()=>el.importSheetInput.click());el.importDataInput.addEventListener("change",event=>importDataFromFile(event.target.files&&event.target.files[0]));el.importSheetInput.addEventListener("change",event=>importSheetFile(event.target.files&&event.target.files[0]));el.copyLogBtn.addEventListener("click",copyLog);el.addStudentBtn.addEventListener("click",addUnassignedStudent);el.newStudentInput.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();addUnassignedStudent();}});el.toggleWallBtn.addEventListener("click",toggleSeatBlocked);el.saveSeatBtn.addEventListener("click",()=>saveSeatEditor(false));el.clearSeatBtn.addEventListener("click",()=>saveSeatEditor(true));el.cancelSeatBtn.addEventListener("click",closeSeatEditor);el.seatEditorModal.addEventListener("click",e=>{if(e.target===el.seatEditorModal)closeSeatEditor();});el.saveAttendanceBtn.addEventListener("click",()=>saveAttendance(false));el.restoreNormalBtn.addEventListener("click",()=>saveAttendance(true));el.cancelAttendanceBtn.addEventListener("click",closeAttendanceModal);el.attendanceModal.addEventListener("click",e=>{if(e.target===el.attendanceModal)closeAttendanceModal();});el.sheetImportByRowsBtn.addEventListener("click",importSheetByRows);el.sheetImportSequentialBtn.addEventListener("click",importSheetSequentially);el.sheetImportCancelBtn.addEventListener("click",closeSheetImportModal);el.sheetImportModal.addEventListener("click",e=>{if(e.target===el.sheetImportModal)closeSheetImportModal();});el.clearOnlyBtn.addEventListener("click",clearSeatOnly);el.cancelPickerBtn.addEventListener("click",closeSeatPickerModal);el.seatPickerModal.addEventListener("click",e=>{if(e.target===el.seatPickerModal)closeSeatPickerModal();});document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible"){const now=getToday();if(state.currentDateKey===now.dateKey){state.currentSession=now.session;renderAll();}}});}
function refreshClockAndShift(){syncWithDeviceTime(true);const shifted=applyScheduledSeatShift(state.currentDateKey,true);if(shifted){renderAll();return;}el.todayInfo.innerHTML=`${state.currentDateDisplay}<br>${state.currentSession}<span class="today-auto">按手机时间自动识别，过时段自动保存</span>`;renderShiftInfo();}
function init(){loadState();syncWithDeviceTime(true);if(!Array.isArray(state.data.seatMatrix)||!state.data.seatMatrix.length)state.data=createDefaultData();applyScheduledSeatShift(state.currentDateKey,true);initEvents();el.manualShiftBtn.addEventListener("click",manualShiftSeats);el.shiftIntervalInput.addEventListener("change",updateShiftInterval);renderAll();setInterval(refreshClockAndShift,60000);}
init();

if ("serviceWorker" in navigator) {
window.addEventListener("load", () => {
navigator.serviceWorker.register("./sw.js").catch(() => {});
});
}
</script>
